# This workflow runs lambda container deployments for dev and stage
# Requirements: Calling repo must contain a Makefile with the following commands
# * `make gha-dist`
# * `make gha-publish`
# * `make gha-update-lambda`
# Details in the repo README
name: Lambda Container Deploy

on:
  workflow_call:
    inputs:
      GHA_ROLE:
        required: true
        type: string
      REGION:
        required: true
        type: string
      # FUNCTION_NAME:
      #   required: true
      #   type: string
      # ECR_REPOSITORY_NAME:
      #   required: true
      #   type: string
    secrets:
      AWS_ACCT:
        required: true

# Set defaults
defaults:
  run:
    shell: bash

# eventually we can pass in different regions and/or account IDs. for now, restricting to Dev1
env:
  AWS_REGION: ${{ inputs.REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCT }}
  IAM_ROLE: ${{ inputs.GHA_ROLE }}
  # FUNC_NAME: ${{ inputs.FUNCTION_NAME }}
  # REPO_NAME: ${{ inputs.ECR_REPOSITORY_NAME }}

jobs:
  deploy:
    name: Deploy build
    runs-on: ubuntu-latest
    # These permissions are needed to interact with GitHub's OIDC Token endpoint.
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build image
        run: make gha-dist
      - name: Push image
        run: make gha-publish
      - name: Update lambda function
        run: make gha-update-lambda
